name: Build PocketDrop Installer

# 1. The Trigger: This tells the action to ONLY run when you publish a new release!
on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-package:
    runs-on: windows-latest

    strategy:
      matrix:
        target: [win-x64, win-x86, win-arm64]
        include:
          - target: win-x64
            arch: x64
          - target: win-x86
            arch: x86
          - target: win-arm64
            arch: arm64

    # 2. Permissions: The robot needs permission to edit your release page
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish PocketDrop
      run: >
        dotnet publish ./PocketDrop/PocketDrop.csproj
        -c Release
        -r ${{ matrix.target }}
        --self-contained true
        -p:PublishSingleFile=true
        -p:UseAppHost=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:IncludeAllContentForSelfExtract=true
        -p:EnableCompressionInSingleFile=true
        -o GH_Publish

    - name: Compile Inno Setup
      run: iscc /DMyAppArch="${{ matrix.arch }}" ./Setup.iss

    # ✨ NEW: The automated security step ✨
    - name: Generate SHA256 Checksum
      run: |
        $exeFile = Get-ChildItem -Path "Output" -Filter "*.exe" | Select-Object -First 1
        $hash = (Get-FileHash $exeFile.FullName -Algorithm SHA256).Hash.ToLower()
        "$hash  $($exeFile.Name)" | Out-File -FilePath "Output\checksums-${{ matrix.arch }}.txt" -Encoding ascii
      shell: pwsh

    # 3. THE MAGIC STEP: This pushes the .exe AND the checksum directly to the release
    - name: Upload directly to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Output/*.exe
          Output/checksums-*.txt